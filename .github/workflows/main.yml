name: Release

on: push

jobs:
  build-distributable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Generate zip
        run: |
          make build
      - name: Upload assets to an artifact for next steps
        uses: actions/upload-artifact@v2
        with:
          name: public
          path: public
          retention-days: 5