name: Release

on: push

env:
  ROOT_DIR: ${{ github.workspace }} 
  DEPS_DIR: ${{ github.workspace }}\deps
  QtBaseDir: ${{ github.workspace }}\deps\QT
  QTDIR32: ${{ github.workspace }}\deps\QT\5.10.1\msvc2017
  QTDIR64: ${{ github.workspace }}\deps\QT\5.10.1\msvc2017_64
  CMAKE_PREFIX_PATH:  ${{ github.workspace }}\deps\QT\5.10.1\msvc2017\lib\cmake\Qt5Widgets
  OBSDepsBasePath: ${{ github.workspace }}\deps\dependencies2019
  DepsBasePath: ${{ github.workspace }}\deps\dependencies2019
  DepsPath64: ${{ github.workspace }}\deps\dependencies2019\win64
  OBSPath: ${{ github.workspace }}\deps\obs-studio
  CPPWSPath: ${{ github.workspace }}\deps\websocketpp
  AsioPath: ${{ github.workspace }}\deps\asio
  buildFolder: ${{ github.workspace }}\deps\release
  build_config: RelWithDebInfo
  PLUGIN_NAME: obs-streamloots

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang_check:
    name: 01 - Code Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      - name: Install clang-format
        run: sudo apt-get install -y clang-format-12
      - name: Run clang-format
        run: |
          sudo chmod 755 .github/scripts/*.sh
          sudo .github/scripts/check-format.sh 
          # sudo .github/scripts/check-changes.sh 

      - name: Install cmake-format
        run: sudo pip install cmakelang

      - name: Run cmake-format
        run: sudo ./.github/scripts/check-cmake.sh

  windows_build:
    runs-on: windows-2022
    strategy:
      matrix:
        arch: ['x86']
        # arch: ['x86', 'x64']
    if: always()
    needs: [clang_check]
    # outputs:
    #   commitHash: ${{ steps.setup.outputs.commitHash }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          path: 'src'
          submodules: 'recursive'

      - name: Checkout obs-studio
        uses: actions/checkout@v3
        with:
          repository: 'obsproject/obs-studio'
          path: 'obs-studio'
          fetch-depth: 0
          submodules: 'recursive'

      - name: Setup Environment
        working-directory: ${{ github.workspace }}/src
        id: setup
        run: |
          $CommitHash = git rev-parse --short HEAD
          Write-Output "::set-output name=commitHash::${CommitHash}"
      
      - name: Build Plugin
        # uses: ././plugin/.github/actions/build-plugin
        uses: .github/actions/build-plugin
        with:
          workingDirectory: ${{ github.workspace }}/src
          target: ${{ matrix.arch }}
          config: RelWithDebInfo
          visualStudio: 'Visual Studio 17 2022'

