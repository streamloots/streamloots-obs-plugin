name: Release

on: push

jobs:
  build-distributable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Clean
        run: |
          rm -rf build32
          rm -rf build64
          rm -rf release
      - name: Upload assets to an artifact for next steps
        uses: actions/upload-artifact@v2
        with:
          name: release
          path: release
          retention-days: 5