name: Release

on: push

env:
  prueba: probando
  pruebaRuta: ${{probando}}/ruta

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  set-env-variables:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - shell: cmd
        run: |        
          SET ROOT_DIR=${GITHUB_WORKSPACE}
          SET DEPS_DIR=%ROOT_DIR%\deps
          SET QtBaseDir=%DEPS_DIR%\QT
          SET QTDIR32=%QtBaseDir%\5.10.1\msvc2017
          SET QTDIR64=%QtBaseDir%\5.10.1\msvc2017_64
          SET CMAKE_PREFIX_PATH=%QTDIR32%\lib\cmake\Qt5Widgets
          SET OBSDepsBasePath=%DEPS_DIR%\dependencies2019
          SET DepsPath64=%OBSDepsBasePath%\win64
          SET OBSPath=%DEPS_DIR%\obs-studio
          SET CPPWSPath=%DEPS_DIR%\websocketpp
          SET AsioPath=%DEPS_DIR%\asio
          SET buildFolder=%ROOT_DIR%\release

          echo "voy a por root"
          echo %ROOT_DIR%
          echo "voy a por QtBaseDir"
          echo %QtBaseDir%
          echo "voy a por prueba"
          echo %prueba%
          echo "voy a por pruebaRuta"
          echo %pruebaRuta%


  prepare-depencies:
    runs-on: windows-latest
    needs: [set-env-variables]
    steps:
      - uses: actions/checkout@v2
      - name: Install QT
        shell: cmd
        run:
          echo %QtBaseDir%
          echo "voy a por prueba"
          echo %prueba%
          echo "voy a por pruebaRuta"
          echo %pruebaRuta%
          # ci\windows\install-qt-win.cmd
          # dir %QtBaseDir%
